<script>
// handle alias anchors by scrolling to the right image if the hash matches a data-target-page span
window.addEventListener('load', function() {
  var hash = window.location.hash.replace('#','');
  if (!hash) return;
  var el = document.getElementById(hash);
  if (el && el.dataset && el.dataset.targetPage) {
    var imgs = document.querySelectorAll('.page-img');
    var idx = parseInt(el.dataset.targetPage, 10) - 1;
    if (imgs[idx]) {
      imgs[idx].scrollIntoView({behavior: 'instant', block: 'start'});
      return;
    }
  }
  if (el) {
    el.scrollIntoView({behavior: 'instant', block: 'start'});
  }
});
</script>
